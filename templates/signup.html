{% extends "base.html" %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h2>Create Account</h2>

        <p class="sub-text">
            Create your AI Career Copilot account.
        </p>

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Create your password"
                required
            >

            <p class="sub-text">
                Use at least 6 characters.
            </p>

            <button type="submit">
                Sign Up
            </button>

        </form>

        <p class="switch-auth">
            Already have an account?
            <a href="/login">Login</a>
        </p>

    </div>

</div>

{% endblock %}
