{% extends "base.html" %}

{% block content %}

<div class="card">

    <h2>Login</h2>

    <form method="POST">

        <label>Email</label>
        <input
            type="email"
            name="email"
            placeholder="Enter your email"
            required
        >

        <br><br>

        <label>Password</label>
        <input
            type="password"
            name="password"
            placeholder="Enter your password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

    <br>

    <p>
        Don't have an account?
        <a href="/signup">Sign Up</a>
    </p>

</div>

{% endblock %}
